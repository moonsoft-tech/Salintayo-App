workflows:
  salintayo-ios-workflow:
    name: Salintayo iOS Workflow (unsigned)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: NewUpdate3
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web bundle
        script: |
          npm run build
      - name: Add and sync Capacitor iOS project
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build unsigned iOS simulator app
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - moonsoft2.0@gmail.com
        notify:
          success: true
          failure: true
