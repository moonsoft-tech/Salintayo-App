workflows:
  salintayo-ios-workflow:
    name: Salintayo iOS Device IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: io.ionic.starter
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: NewUpdate3
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web bundle
        script: |
          npm run build
      - name: Add and sync Capacitor iOS project
        script: |
          if [ ! -d ios ]; then
            npx cap add ios --packagemanager SPM
          fi
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed IPA for device
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - moonsoft2.0@gmail.com
        notify:
          success: true
          failure: true
